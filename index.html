<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MetricsAiUp — Мониторинг СТО</title>
  <script>
    // Redirect to backend which serves the full app
    var host = window.location.hostname;
    var target = window.location.protocol + '//' + host + ':3001';
    window.location.replace(target);
  </script>
</head>
<body>
  <p>Перенаправление на <a id="link">MetricsAiUp</a>...</p>
  <script>
    var a = document.getElementById('link');
    a.href = window.location.protocol + '//' + window.location.hostname + ':3001';
    a.textContent = a.href;
  </script>
</body>
</html>
