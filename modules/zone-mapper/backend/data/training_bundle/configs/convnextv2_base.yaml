# Fallback config — ConvNeXt-V2 Base (88M). Use if Large runs OOM on 3070.
# Loses ~0.5% vs Large but still excellent; trains noticeably faster.

run_name: convnextv2_base_384

dataset_root: dataset
splits_root: splits

img_size: 384
batch_size: 16
batch_size_eval: 32
num_workers: 6

model:
  name: convnextv2_base.fcmae_ft_in22k_in1k_384
  pretrained: true
  drop_path: 0.15

epochs: 8
amp: true
compile: false

optim:
  lr_backbone: 5.0e-5
  lr_head: 1.0e-3
  weight_decay: 0.05

body_loss_weight: 0.3
log_interval: 50
